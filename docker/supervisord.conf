[program:oracle-relay]
command=node services/oracle-relay/dist/cli.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30

[program:registry-api]
command=node services/registry-api/dist/index.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30

[program:kyb-gateway]
command=node services/kyb-gateway/dist/index.js
directory=/app
environment=KYB_DATA_DIR="/data/kyb",KYB_GATEWAY_PORT="8090",KYB_COMPLETE_SECRET="%(ENV_KYB_COMPLETE_SECRET)s"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=40

[program:party-provisioner]
command=node services/party-provisioner/dist/index.js
directory=/app
environment=PROVISIONER_DATA_DIR="/data/provisioner",PROVISIONER_PORT="8091",KYB_GATEWAY_URL="http://127.0.0.1:8090"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=40

[program:agent-runtime]
command=/app/docker/run-agent-runtime.sh
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50

[program:nginx]
command=nginx -g "daemon off;"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100
